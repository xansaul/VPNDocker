services:
  cliente_local:
    build:
      context: .
      dockerfile: Dockerfile.client
    network_mode: "host"
    environment:
      - HUB_ADDR=${HUB_ADDR}
      - CLIENT_IP=${CLIENT_IP}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G      
        reservations:
          cpus: '1.0'
          memory: 256M